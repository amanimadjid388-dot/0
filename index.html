<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scientific Site</title>
  <style>
    body {
      margin: 0;
      height: 100vh;              /* ارتفاع الشاشة بالكامل */
      width: 100vw;               /* عرض الشاشة بالكامل */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: 'Courier New', monospace;

      /* الخلفية بالصورة */
      background-image: url("InShot_20260630_221201852.jpg"); 
      background-size: 100% 100%;  /* تجعل الصورة بنفس حجم الموقع بالضبط */
      background-position: center; /* تتمركز في الوسط */
      background-repeat: no-repeat;/* بدون تكرار */
    }

    h1 {
      font-size: 2.5em;
      border-right: .15em solid orange;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 34ch; }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: orange }
    }

    button {
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 1.2em;
      cursor: pointer;
      background: orange;
      border: none;
      border-radius: 8px;
      color: black;
    }

    #nextBtn {
      opacity: 0;
      animation: fadeIn 1s ease forwards, pulse 1.5s infinite;
      animation-delay: 5s;
    }

    @keyframes fadeIn {
      to { opacity: 1 }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1 id="title">Not magic, it's physics and maths</h1>
  <button id="startBtn">Start</button>
  <button id="nextBtn" onclick="nextPage()">Next</button>

  <audio id="typingSound" src="sounds/typing.mp3"></audio>

  <script>
    const title = document.getElementById("title");
    const sound = document.getElementById("typingSound");
    const startBtn = document.getElementById("startBtn");

    startBtn.onclick = function() {
      sound.play();
      title.style.animation = "typing 5s steps(34, end) forwards, blink .75s step-end infinite";
      setTimeout(() => sound.pause(), 5000);
      startBtn.style.display = "none";
    };

    function nextPage() {
      window.location.href = "lessons.html";
    }
  </script>
</body>
</html>
