<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scientific Site</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0f0f0f;
      color: white;
      font-family: 'Courier New', monospace;
    }

    h1 {
      font-size: 2.5em;
      border-right: .15em solid orange;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 34ch; }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: orange }
    }

    button {
      margin-top: 40px;
      padding: 15px 30px;
      font-size: 1.2em;
      cursor: pointer;
      background: orange;
      border: none;
      border-radius: 8px;
      color: black;
    }

    #nextBtn {
      opacity: 0;
      animation: fadeIn 1s ease forwards, pulse 1.5s infinite;
      animation-delay: 5s;
    }

    @keyframes fadeIn {
      to { opacity: 1 }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1 id="title">Not magic, it's physics and maths</h1>
  <button id="startBtn">Start</button>
  <button id="nextBtn" onclick="nextPage()">Next</button>

  <!-- ملف الصوت -->
  <audio id="typingSound" src="Find 'صوت كيبورد' on TikTok - TikTok Search.mp3"></audio>

  <script>
    const title = document.getElementById("title");
    const sound = document.getElementById("typingSound");
    const startBtn = document.getElementById("startBtn");

    startBtn.onclick = function() {
      // تشغيل الصوت عند الضغط
      sound.play();

      // تشغيل أنيميشن الكتابة
      title.style.animation = "typing 5s steps(34, end) forwards, blink .75s step-end infinite";

      // إيقاف الصوت بعد انتهاء الكتابة
      setTimeout(() => sound.pause(), 5000);

      // إخفاء زر Start بعد الضغط
      startBtn.style.display = "none";
    };

    function nextPage() {
      window.location.href = "lessons.html"; // الانتقال للصفحة الثانية
    }
  </script>
</body>
</html>
